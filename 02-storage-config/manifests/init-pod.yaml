apiVersion: v1
kind: Pod
metadata:
  name: init-demo
  labels:
    app: init-demo
spec:
  initContainers:
  - name: init
    image: busybox:1.36
    command:
    - sh
    - -c
    - 'echo "<h1>Hello from init container</h1>" > /work/index.html && echo "init done"'
    volumeMounts:
    - name: work
      mountPath: /work
  containers:
  - name: nginx
    image: nginx:1.27
    ports:
    - containerPort: 80
    volumeMounts:
    - name: work
      mountPath: /usr/share/nginx/html
  volumes:
  - name: work
    emptyDir: {}