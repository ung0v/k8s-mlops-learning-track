apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-serve
  labels:
    app: iris-serve
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iris-serve
  template:
    metadata:
      labels:
        app: iris-serve
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
      containers:
      - name: serve
        image: iris-serve:0.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_PATH
          value: /data/model.joblib
        volumeMounts:
        - name: data
          mountPath: /data
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: model-pvc
          readOnly: true